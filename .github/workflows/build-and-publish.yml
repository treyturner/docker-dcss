name: Build and publish dev
run-name: ${{ github.event_name == 'workflow_dispatch' && format('Manually triggered dev build of {0}', inputs.upstream-ref || 'latest upstream release') || 'Automated dev build of latest upstream release' }}

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      upstream-ref:
        required: false
        type: string

jobs:
  build-and-publish-dev:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Build
        id: build
        uses: ./.github/actions/build
        with:
          label: 'dev'
          repos: |
            ghcr.io/treyturner/dcss
            forgejo.treyturner.info/treyturner/dcss
            docker.io/treyturner/dcss
          upstream-ref: ${{ inputs.upstream-ref }}

      - name: Test
        uses: ./.github/actions/test
        with:
          image-ref: ${{ steps.build.outputs.primary-ref }}
          crawl-tag: ${{ steps.build.outputs.crawl-tag }}

      - name: Publish
        uses: ./.github/actions/publish
        with:
          dockerhub-username: ${{ vars.DOCKERHUB_USERNAME }}
          dockerhub-password: ${{ secrets.DOCKERHUB_TOKEN }}
          github-token: ${{ github.token }}
          forgejo-token: ${{ secrets.FORGEJO_REGISTRY_TOKEN }}
          refs: ${{ steps.build.outputs.refs }}
