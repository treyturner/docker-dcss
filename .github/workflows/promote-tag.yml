name: Promote dev to release
run-name: Promote ${{ inputs.release-version }}-dev to ${{ inputs.release-version }}${{ inputs.promote-latest && ' and latest' || '' }}

on:
  workflow_dispatch:
    inputs:
      release-version:
        description: "Targeted release tag (e.g. '0.34.1')"
        type: string
        required: true
      promote-latest:
        description: "Also promote to 'latest' (only enable if promoting the newest DCSS release)"
        type: boolean
        required: false
        default: false

jobs:
  promote-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      PROJECT_NAME: dcss
    steps:
      - name: Validate selections
        shell: bash -euo pipefail {0}
        id: prepare
        env:
          RELEASE_VERSION: ${{ inputs.release-version }}
          PROMOTE_LATEST: ${{ inputs.promote-latest }}
        run: |
          if ! [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::RELEASE_VERSION must match <digit>.<digit>.<digit> (e.g. 0.34.1)"
            exit 1
          fi
          source_tag="${RELEASE_VERSION}-dev"
          tags=("${RELEASE_VERSION}")

          if [[ "${PROMOTE_LATEST}" == "true" ]]; then
            tags+=("latest")
          fi

          {
            printf 'source-tag=%s\n' "${source_tag}"
            printf 'tags<<EOF\n'
            for tag in "${tags[@]}"; do
              printf '%s\n' "$tag"
            done
            printf 'EOF\n'
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
        with:
          driver: docker

      - name: Login to DockerHub
        uses: docker/login-action@c144859092e8e353f3e118b0b329679a62351c3e  # v4.0.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c144859092e8e353f3e118b0b329679a62351c3e  # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Forgejo Container Registry
        uses: docker/login-action@c144859092e8e353f3e118b0b329679a62351c3e  # v4.0.0
        with:
          registry: forgejo.treyturner.info
          username: ${{ github.repository_owner }}
          password: ${{ secrets.FORGEJO_REGISTRY_TOKEN }}

      - name: Promote tags
        shell: bash -euo pipefail {0}
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          PROJECT_NAME: ${{ env.PROJECT_NAME }}
          GH_OWNER: ${{ github.repository_owner }}
          SOURCE_TAG: ${{ steps.prepare.outputs.source-tag }}
          TARGET_TAGS: ${{ steps.prepare.outputs.tags }}
        run: |
          owner_lower=$(printf '%s' "$GH_OWNER" | tr '[:upper:]' '[:lower:]')

          declare -A repos=(
            [ghcr.io]="${owner_lower}/${PROJECT_NAME}"
            [forgejo.treyturner.info]="${owner_lower}/${PROJECT_NAME}"
            [docker.io]="${DOCKERHUB_USERNAME}/${PROJECT_NAME}"
          )

          for registry in "${!repos[@]}"; do
            source="${registry}/${repos[$registry]}:${SOURCE_TAG}"
            echo "Validating source manifest on ${registry}: ${source}"
            docker buildx imagetools inspect "${source}" > /dev/null
          done

          mapfile -t tags <<< "$TARGET_TAGS"
          for tag in "${tags[@]}"; do
            [ -n "$tag" ] || continue

            for registry in "${!repos[@]}"; do
              source="${registry}/${repos[$registry]}:${SOURCE_TAG}"
              echo "Promoting ${registry} tag: ${source} -> ${tag}"
              docker buildx imagetools create \
                --tag "${registry}/${repos[$registry]}:${tag}" \
                "${source}"
            done
          done
